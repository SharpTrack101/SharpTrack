<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — SharpTrack</title>
    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; text-align: center;
        }

        .container { animation: fadeUp 0.4s ease both; }

        .error-code {
            font-size: 80px; font-weight: 900; color: var(--primary);
            line-height: 1; margin-bottom: 12px; opacity: 0.3;
        }

        .container h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .container p { font-size: 14px; color: var(--muted); margin-bottom: 24px; max-width: 300px; margin-inline: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
        <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
    </div>
    <script src="js/app.js"></script>
    <script>initTheme();</script>
</body>
</html>
