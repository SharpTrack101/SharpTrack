<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Add Stock</title>
    <meta name="description" content="Add new products to your SharpTrack inventory.">
    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body { padding-bottom: 90px; }

        .back-row {
            display: flex; align-items: center; gap: 8px; padding: 16px 0 8px;
        }
        .back-btn {
            display: flex; align-items: center; gap: 4px; color: var(--primary); font-size: 14px;
            font-weight: 600; cursor: pointer; text-decoration: none; background: none; border: none;
            font-family: var(--font-family);
        }

        .page-title { margin-bottom: 24px; }
        .page-title h1 { font-size: 24px; margin-bottom: 4px; }
        .page-title p { font-size: 14px; color: var(--muted); }

        .form-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px;
            margin-bottom: 20px;
        }

        .form-card h2 {
            font-size: 15px; font-weight: 700; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .form-card h2 .badge {
            background: var(--primary-light); color: var(--primary);
            font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 700;
        }

        .unit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .input-wrapper input:not([type="number"]),
        .input-wrapper select { padding-left: 44px; }

        .quick-units { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .unit-tag {
            padding: 6px 12px; border-radius: 16px; background: var(--border-light);
            font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text);
            border: 1.5px solid transparent; transition: all 0.15s;
            font-family: var(--font-family);
        }
        .unit-tag:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
        .unit-tag.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    </style>
</head>
<body>

    <div class="content">
        <div class="back-row">
            <button class="back-btn" onclick="history.back()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                Back
            </button>
        </div>

        <div class="page-title">
            <h1>Add Stock</h1>
            <p>Add a new product to your inventory</p>
        </div>

        <!-- PRODUCT INFO -->
        <div class="form-card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                Product Details <span class="badge">Required</span>
            </h2>

            <div class="input-group">
                <label for="productName">Product Name</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </span>
                    <input type="text" id="productName" placeholder="e.g. Peak Milk Tin">
                </div>
            </div>

            <div class="input-group">
                <label for="sellingPrice">Selling Price (₦)</label>
                <div class="input-wrapper">
                    <span class="icon-left" style="font-size:16px;font-weight:700;color:var(--primary);">₦</span>
                    <input type="number" id="sellingPrice" placeholder="0.00" min="0" step="0.01" style="padding-left:44px;">
                </div>
            </div>

            <div class="unit-row">
                <div class="input-group">
                    <label for="quantity">Quantity</label>
                    <div class="input-wrapper">
                        <span class="icon-left" style="font-size:14px;font-weight:700;color:var(--primary);">#</span>
                        <input type="number" id="quantity" placeholder="0" min="0" step="1" style="padding-left:44px;">
                    </div>
                </div>
                <div class="input-group">
                    <label for="reorderLevel">Reorder Level</label>
                    <div class="input-wrapper">
                        <span class="icon-left">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        </span>
                        <input type="number" id="reorderLevel" placeholder="5" min="0" step="1" style="padding-left:44px;">
                    </div>
                </div>
            </div>

            <div class="input-group mb-0">
                <label>Unit</label>
                <div class="quick-units">
                    <button class="unit-tag active" onclick="selectUnit(this, 'pieces')">Pieces</button>
                    <button class="unit-tag" onclick="selectUnit(this, 'cartons')">Cartons</button>
                    <button class="unit-tag" onclick="selectUnit(this, 'bags')">Bags</button>
                    <button class="unit-tag" onclick="selectUnit(this, 'packs')">Packs</button>
                    <button class="unit-tag" onclick="selectUnit(this, 'crates')">Crates</button>
                    <button class="unit-tag" onclick="selectUnit(this, 'kg')">Kg</button>
                    <button class="unit-tag" onclick="selectUnit(this, 'litres')">Litres</button>
                </div>
            </div>
        </div>

        <button class="btn btn-primary btn-block btn-lg" id="submitBtn" onclick="handleSubmit()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Product
        </button>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (!initPage('add-stock')) { /* redirected */ }
        else {
            injectNavbar();
            injectBottomNav('inventory');
        }

        let selectedUnit = 'pieces';

        function selectUnit(el, unit) {
            selectedUnit = unit;
            document.querySelectorAll('.unit-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        async function handleSubmit() {
            const name = document.getElementById('productName').value.trim();
            const sellingPrice = document.getElementById('sellingPrice').value;
            const quantity = document.getElementById('quantity').value;
            const reorderLevel = document.getElementById('reorderLevel').value || '5';
            const btn = document.getElementById('submitBtn');

            if (!name) {
                showToast('warning', 'Name Required', 'Enter a product name.');
                document.getElementById('productName').focus();
                return;
            }

            if (!sellingPrice || parseFloat(sellingPrice) <= 0) {
                showToast('warning', 'Price Required', 'Enter a valid selling price.');
                document.getElementById('sellingPrice').focus();
                return;
            }

            if (!quantity || parseInt(quantity) < 0) {
                showToast('warning', 'Quantity Required', 'Enter the stock quantity.');
                document.getElementById('quantity').focus();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Adding...';

            try {
                await apiRequest('/api/products', {
                    method: 'POST',
                    body: JSON.stringify({
                        name,
                        sellingPrice: parseFloat(sellingPrice),
                        quantity: parseInt(quantity),
                        reorderLevel: parseInt(reorderLevel),
                        unit: selectedUnit
                    })
                });

                showToast('success', 'Product Added! 📦', `${name} has been added to your inventory.`);

                // Reset form
                document.getElementById('productName').value = '';
                document.getElementById('sellingPrice').value = '';
                document.getElementById('quantity').value = '';
                document.getElementById('reorderLevel').value = '';
                selectedUnit = 'pieces';
                document.querySelectorAll('.unit-tag').forEach(t => t.classList.remove('active'));
                document.querySelector('.unit-tag').classList.add('active');

            } catch (err) {
                showToast('error', 'Failed', err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Product';
            }
        }
    </script>
</body>
</html>
