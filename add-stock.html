<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Add Stock</title>
    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/design-system.css">

    <!-- External Libraries -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        body { padding-bottom: 90px; }

        /* ── BACK ROW ── */
        .back-row {
            display: flex; align-items: center; gap: 8px; padding: 16px 0 8px;
        }
        .back-btn {
            display: flex; align-items: center; gap: 4px; color: var(--primary); font-size: 14px;
            font-weight: 600; cursor: pointer; text-decoration: none; background: none; border: none;
            font-family: var(--font-family); transition: opacity var(--transition-fast);
        }
        .back-btn:active { opacity: 0.7; }

        /* ── PAGE TITLE ── */
        .page-title { margin-bottom: 24px; }
        .page-title h1 { font-size: 24px; margin-bottom: 4px; }
        .page-title p { font-size: 14px; color: var(--muted); }

        /* ── IMAGE BOX ── */
        .image-box {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all var(--transition-normal);
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(37, 160, 96, 0.08);
        }
        .image-box:hover { border-color: var(--primary); }
        .image-box.has-image {
            border-color: var(--primary);
            box-shadow: 0 0 24px rgba(37, 160, 96, 0.15);
        }
        .image-box img { width: 100%; height: 100%; object-fit: contain; }
        .image-box .placeholder {
            display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--muted);
            font-size: 13px; font-weight: 500;
        }
        .image-box .placeholder svg { color: var(--primary); opacity: 0.6; }

        /* ── ACTION BUTTONS ── */
        .magic-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .magic-btn {
            padding: 12px 16px; border-radius: var(--radius-md);
            border: 1.5px solid var(--border);
            background: var(--card-bg); font-weight: 600; font-size: 13px; color: var(--text);
            display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
            transition: all var(--transition-fast); font-family: var(--font-family);
        }
        .magic-btn:hover { border-color: var(--primary); color: var(--primary); }
        .magic-btn:active { transform: scale(0.97); }
        .magic-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .magic-btn.ai {
            background: linear-gradient(135deg, var(--primary-light), var(--card-bg));
            border-color: var(--primary); color: var(--primary);
        }
        .magic-btn.ai:hover { box-shadow: var(--shadow-primary); }

        /* ── FORM CARDS ── */
        .form-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px;
            margin-bottom: 16px; border: 1px solid var(--border);
        }
        .form-card h2 {
            font-size: 15px; font-weight: 700; margin-bottom: 16px;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text);
        }

        /* ── AI BADGE ── */
        .ai-badge {
            font-size: 11px; font-weight: 600; color: var(--primary);
            background: var(--primary-light); padding: 4px 10px; border-radius: 12px;
            animation: bannerSlideIn 0.3s ease both;
        }

        /* ── FIELD ROWS ── */
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 400px) { .field-row { grid-template-columns: 1fr; gap: 8px; } }

        /* ── INPUT OVERRIDES ── */
        .input-wrapper input,
        .input-wrapper select {
            background: var(--bg-secondary) !important;
            border-color: var(--border) !important;
            color: var(--text) !important;
        }
        .input-wrapper input:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px var(--primary-ghost);
        }
        .input-wrapper input::placeholder { color: var(--muted); opacity: 0.6; }

        .input-wrapper input:not([type="number"]),
        .input-wrapper select { padding-left: 44px; }

        /* ── BARCODE ROW ── */
        .barcode-row { display: flex; gap: 8px; }
        .barcode-row .input-wrapper { flex: 1; }
        .btn-lookup {
            background: var(--primary-light); color: var(--primary); border: none;
            border-radius: var(--radius-md); padding: 0 16px; font-weight: 600; cursor: pointer;
            font-family: var(--font-family); transition: all var(--transition-fast);
        }
        .btn-lookup:hover { background: var(--primary); color: white; }

        /* ── UNIT TAGS ── */
        .quick-units { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .unit-tag {
            padding: 6px 14px; border-radius: 16px; background: var(--bg-secondary);
            font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-secondary);
            border: 1.5px solid transparent; transition: all var(--transition-fast);
            font-family: var(--font-family);
        }
        .unit-tag:hover, .unit-tag.active {
            border-color: var(--primary); background: var(--primary-light); color: var(--primary);
        }

        /* ── AI STATUS BANNER ── */
        @keyframes bannerSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ai-status-banner {
            padding: 12px 16px; border-radius: var(--radius-md); font-size: 13px;
            margin-bottom: 16px; display: flex; gap: 8px; align-items: center;
            animation: bannerSlideIn 0.3s ease both;
            font-weight: 500;
        }
        .ai-status-banner.success {
            background: rgba(46, 158, 91, 0.15); color: var(--green);
            border: 1px solid rgba(46, 158, 91, 0.3);
        }
        .ai-status-banner.warning {
            background: rgba(224, 123, 42, 0.15); color: var(--orange);
            border: 1px solid rgba(224, 123, 42, 0.3);
        }
        .ai-status-banner.error {
            background: rgba(229, 57, 53, 0.15); color: var(--red);
            border: 1px solid rgba(229, 57, 53, 0.3);
        }

        /* ── AI GENERATED MARKER ── */
        .ai-generated { border-left: 3px solid var(--primary) !important; }

        /* ── LOADING OVERLAY ── */
        .ai-loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: 600; gap: 16px;
        }

        /* ── SUBMIT BUTTON SPACING ── */
        #submitBtn { margin-bottom: 24px; }

        /* ── UTILITIES ── */
        .hidden { display: none !important; }
        .mb-0 { margin-bottom: 0 !important; }

        /* ── BARCODE SCANNER ── */
        #reader { width: 100%; border-radius: var(--radius-lg); overflow: hidden; border: none; margin-bottom: 16px; }

        /* ── CUSTOM DROPDOWN ── */
        .custom-dropdown { position: relative; width: 100%; }
        .custom-dropdown-header {
            width: 100%; height: 48px; padding: 0 16px 0 44px;
            background: var(--bg-secondary); border: 1.5px solid var(--border);
            border-radius: var(--radius-md); font-family: var(--font-family);
            font-size: 14px; color: var(--text);
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all var(--transition-fast);
        }
        .custom-dropdown-header:focus, .custom-dropdown.open .custom-dropdown-header {
            border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ghost); outline: none;
        }
        .custom-dropdown-header.placeholder-text { color: var(--muted); }
        .custom-dropdown-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-md); margin-top: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 10;
            max-height: 200px; overflow-y: auto; display: none;
        }
        .custom-dropdown.open .custom-dropdown-list {
            display: block; animation: bannerSlideIn 0.2s ease;
        }
        .custom-dropdown-item {
            padding: 12px 16px; font-size: 14px; color: var(--text);
            cursor: pointer; transition: background var(--transition-fast);
        }
        .custom-dropdown-item:hover {
            background: var(--primary-ghost); color: var(--primary);
        }

        /* ── CROPPER MODAL ── */
        .st-cropper-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column;
        }
        .cropper-container-wrapper {
            flex: 1; width: 100%; height: calc(100% - 80px);
        }
        .cropper-actions {
            height: 80px; background: #111; display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="back-row">
            <button class="back-btn" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                Back
            </button>
        </div>

        <div class="page-title">
            <h1>Add Stock</h1>
            <p>Add a new product to your inventory</p>
        </div>

        <!-- BARCODE SCANNER OVERLAY -->
        <div id="scannerSection" class="hidden">
            <div id="reader"></div>
            <button class="btn btn-outline btn-block" onclick="stopBarcodeScanner()" style="border-color: var(--border); color: var(--text);">Cancel Scanning</button>
            <div style="height: 24px;"></div>
        </div>

        <!-- MAIN FORM -->
        <div id="mainFormContainer">
            <!-- Image Box -->
            <div class="image-box" id="imageBox" onclick="document.getElementById('manualImageInput').click()">
                <div class="placeholder" id="imagePlaceholder">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>Tap to Add Photo</span>
                </div>
                <img id="imagePreview" class="hidden" src="" alt="Product Preview">
            </div>
            <input type="file" id="manualImageInput" accept="image/*" class="hidden" onchange="initCrop(event, 'manual')">

            <!-- Action Buttons -->
            <div class="magic-actions">
                <button class="magic-btn ai" id="aiScanBtn" onclick="document.getElementById('aiCameraInput').click()">
                    <span>📷</span> Scan Product
                </button>
                <input type="file" id="aiCameraInput" accept="image/*" capture="environment" class="hidden" onchange="initCrop(event, 'ai')">

                <button class="magic-btn" onclick="startBarcodeScanner()">
                    <span>🔍</span> Scan Barcode
                </button>
            </div>

            <!-- AI Status Banner -->
            <div id="aiStatusBanner" class="ai-status-banner hidden">
                <div id="aiStatusIcon"></div>
                <span id="aiStatusText"></span>
            </div>

            <!-- PRODUCT INFORMATION -->
            <div class="form-card">
                <h2>
                    Product Information
                    <span class="ai-badge hidden" id="aiBadge">✨ AI Filled</span>
                </h2>

                <!-- Barcode with Lookup -->
                <div class="input-group">
                    <label for="barcode">Barcode</label>
                    <div class="barcode-row">
                        <div class="input-wrapper">
                            <span class="icon-left"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg></span>
                            <input type="text" id="barcode" placeholder="e.g. 6151100020126">
                        </div>
                        <button class="btn-lookup" onclick="lookupBarcodeManual()">Lookup</button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="productName">Product Name *</label>
                    <div class="input-wrapper">
                        <span class="icon-left"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></span>
                        <input type="text" id="productName" placeholder="e.g. Peak Milk Tin">
                    </div>
                </div>

                <div class="field-row">
                    <div class="input-group">
                        <label for="brand">Brand</label>
                        <div class="input-wrapper">
                            <span class="icon-left"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
                            <input type="text" id="brand" placeholder="e.g. FrieslandCampina">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="weight">Weight/Size</label>
                        <div class="input-wrapper">
                            <span class="icon-left"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg></span>
                            <input type="text" id="weight" placeholder="e.g. 400g">
                        </div>
                    </div>
                </div>

                <div class="input-group mb-0">
                    <label>Category</label>
                    <div class="custom-dropdown" id="categoryDropdown" onclick="toggleDropdown()">
                        <div class="input-wrapper" style="position:relative;">
                            <span class="icon-left" style="z-index:2;"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
                            <div class="custom-dropdown-header placeholder-text" id="categorySelected" tabindex="0">
                                Select or type category...
                            </div>
                        </div>
                        <div class="custom-dropdown-list" id="categoryOptions">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                    <input type="hidden" id="categoryName" value="">
                </div>
            </div>

            <!-- PRICING & STOCK -->
            <div class="form-card">
                <h2>Pricing &amp; Stock</h2>

                <div class="field-row">
                    <div class="input-group">
                        <label for="costPrice">Cost Price (₦) *</label>
                        <div class="input-wrapper">
                            <span class="icon-left" style="font-size:16px;font-weight:700;color:var(--muted);">₦</span>
                            <input type="number" id="costPrice" placeholder="0.00" min="0" step="0.01" style="padding-left:44px;">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="sellingPrice">Selling Price (₦) *</label>
                        <div class="input-wrapper">
                            <span class="icon-left" style="font-size:16px;font-weight:700;color:var(--primary);">₦</span>
                            <input type="number" id="sellingPrice" placeholder="0.00" min="0" step="0.01" style="padding-left:44px;">
                        </div>
                    </div>
                </div>

                <div class="field-row">
                    <div class="input-group">
                        <label for="quantity">Quantity *</label>
                        <div class="input-wrapper">
                            <span class="icon-left" style="font-size:14px;font-weight:700;color:var(--primary);">#</span>
                            <input type="number" id="quantity" placeholder="0" min="0" step="1" style="padding-left:44px;">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="reorderLevel">Reorder Level</label>
                        <div class="input-wrapper">
                            <span class="icon-left"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></span>
                            <input type="number" id="reorderLevel" placeholder="5" min="0" step="1" style="padding-left:44px;">
                        </div>
                    </div>
                </div>

                <div class="input-group mb-0">
                    <label>Select Unit</label>
                    <div class="quick-units">
                        <button class="unit-tag active" onclick="selectUnit(this, 'pieces')">Pieces</button>
                        <button class="unit-tag" onclick="selectUnit(this, 'cartons')">Cartons</button>
                        <button class="unit-tag" onclick="selectUnit(this, 'bags')">Bags</button>
                        <button class="unit-tag" onclick="selectUnit(this, 'packs')">Packs</button>
                        <button class="unit-tag" onclick="selectUnit(this, 'crates')">Crates</button>
                        <button class="unit-tag" onclick="selectUnit(this, 'kg')">Kg</button>
                        <button class="unit-tag" onclick="selectUnit(this, 'litres')">Litres</button>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary btn-block btn-lg" id="submitBtn" onclick="handleSubmit()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Save Product
            </button>
        </div>

        <!-- AI LOADING OVERLAY -->
        <div id="aiLoadingOverlay" class="ai-loading-overlay hidden">
            <div class="spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
            <p>Analyzing Product with AI... ✨</p>
        </div>

    </div>

    <!-- CROPPER MODAL -->
    <div id="cropperModal" class="st-cropper-modal hidden">
        <div class="cropper-container-wrapper">
            <img id="cropperImage" src="" style="max-width: 100%;">
        </div>
        <div class="cropper-actions">
            <button class="btn btn-outline" style="border-color: #555; color: white;" onclick="cancelCrop()">Cancel</button>
            <button class="btn btn-primary" onclick="confirmCrop()">Crop &amp; Save</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (!initPage('add-stock')) { /* redirected */ }
        else {
            injectNavbar();
            injectBottomNav('inventory');
            loadCategories();
        }

        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? ''
            : 'https://sharptrack-api.onrender.com';

        let selectedUnit = 'pieces';
        let html5Qrcode = null;
        let aiImageBase64 = null;
        let cropper = null;
        let activeCropMode = 'manual'; // 'manual' or 'ai'

        // --- UNIT MAPPING (normalized aliases) ---
        const CATEGORY_UNIT_MAP = {
            // Liquids
            'beverage': 'litres', 'beverages': 'litres', 'soft drink': 'litres',
            'soda': 'litres', 'carbonated': 'litres', 'juice': 'litres',
            'water': 'litres', 'wine': 'litres', 'spirit': 'litres',
            'cooking oil': 'litres', 'oil': 'litres', 'liquid': 'litres',
            // Crates
            'drinks': 'crates', 'beer': 'crates', 'malt': 'crates',
            // Bags
            'rice': 'bags', 'grains': 'bags', 'flour': 'bags', 'sugar': 'bags',
            'cement': 'bags', 'building': 'bags', 'feed': 'bags',
            // Packs
            'groceries': 'packs', 'grocery': 'packs', 'snacks': 'packs',
            'snack': 'packs', 'biscuit': 'packs', 'noodles': 'packs',
            'pasta': 'packs', 'seasoning': 'packs', 'spice': 'packs',
            'detergent': 'packs', 'cleaning': 'packs', 'toiletries': 'packs',
            'cosmetics': 'packs', 'soap': 'packs',
            // Kg
            'meat': 'kg', 'fish': 'kg', 'produce': 'kg', 'vegetable': 'kg',
            'fruit': 'kg', 'frozen': 'kg',
            // Pieces
            'electronics': 'pieces', 'gadgets': 'pieces', 'phones': 'pieces',
            'phone': 'pieces', 'accessory': 'pieces', 'accessories': 'pieces',
            'dairy': 'pieces', 'milk': 'pieces', 'canned': 'pieces',
            'tin': 'pieces', 'battery': 'pieces', 'bulb': 'pieces',
            // Cartons
            'carton': 'cartons', 'wholesale': 'cartons',
        };

        function getUnitForCategory(category) {
            if (!category) return null;
            const normalized = category.toLowerCase().trim();

            // Direct match first
            if (CATEGORY_UNIT_MAP[normalized]) return CATEGORY_UNIT_MAP[normalized];

            // Partial / substring match
            for (const [alias, unit] of Object.entries(CATEGORY_UNIT_MAP)) {
                if (normalized.includes(alias) || alias.includes(normalized)) return unit;
            }
            return null;
        }

        function autoSelectUnit(unitName) {
            if (!unitName) return;
            const normalized = unitName.toLowerCase();
            const unitBtns = document.querySelectorAll('.unit-tag');
            for (const btn of unitBtns) {
                if (btn.textContent.trim().toLowerCase() === normalized) {
                    selectUnit(btn, normalized);
                    return;
                }
            }
            // No matching button found — ignore safely
        }

        function goBack() {
            if (!document.getElementById('scannerSection').classList.contains('hidden')) {
                stopBarcodeScanner();
            } else {
                history.back();
            }
        }

        function selectUnit(el, unit) {
            selectedUnit = unit;
            document.querySelectorAll('.unit-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        // --- CUSTOM DROPDOWN LOGIC ---
        let categoryList = [];

        async function loadCategories() {
            try {
                const res = await apiRequest('/api/products/categories');
                categoryList = res.categories || [];
                renderCategories(categoryList);
            } catch (err) {
                console.error("Failed to load categories:", err);
            }
        }

        function renderCategories(list) {
            const container = document.getElementById('categoryOptions');
            if (list.length === 0) {
                container.innerHTML = '<div class="custom-dropdown-item" style="color:var(--muted)">No categories found</div>';
                return;
            }
            container.innerHTML = list.map(c => `<div class="custom-dropdown-item" onclick="selectCategory('${c}', event)">${c}</div>`).join('');
        }

        function toggleDropdown() {
            document.getElementById('categoryDropdown').classList.toggle('open');
        }

        function selectCategory(catName, e) {
            if(e) e.stopPropagation();
            document.getElementById('categoryName').value = catName;
            document.getElementById('categorySelected').innerText = catName;
            document.getElementById('categorySelected').classList.remove('placeholder-text');
            document.getElementById('categoryDropdown').classList.remove('open');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('categoryDropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                dropdown.classList.remove('open');
            }
        });

        // --- CROPPER LOGIC ---
        async function initCrop(event, mode) {
            const file = event.target.files[0];
            if (!file) return;

            activeCropMode = mode;
            const base64Str = await convertFileToBase64(file);
            
            // Open Cropper Modal
            document.getElementById('cropperModal').classList.remove('hidden');
            const image = document.getElementById('cropperImage');
            image.src = base64Str;
            
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, {
                aspectRatio: 1, // Square crop for products
                viewMode: 1,
                autoCropArea: 0.8,
                background: false
            });

            event.target.value = ''; // Reset file input
        }

        function cancelCrop() {
            if (cropper) cropper.destroy();
            document.getElementById('cropperModal').classList.add('hidden');
        }

        function confirmCrop() {
            if (!cropper) return;
            
            // Get cropped image
            const canvas = cropper.getCroppedCanvas({
                width: 500,
                height: 500,
            });
            const croppedBase64 = canvas.toDataURL('image/jpeg', 0.8);
            
            cancelCrop();
            setPreviewImage(croppedBase64);

            if (activeCropMode === 'ai') {
                processAIImage(croppedBase64);
            }
        }

        // --- IMAGE HANDLING ---
        function setPreviewImage(base64Str) {
            aiImageBase64 = base64Str;
            const img = document.getElementById('imagePreview');
            const box = document.getElementById('imageBox');
            const placeholder = document.getElementById('imagePlaceholder');
            
            img.src = base64Str;
            img.classList.remove('hidden');
            placeholder.classList.add('hidden');
            box.classList.add('has-image');
        }

        function convertFileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // --- BARCODE SCANNER & LOOKUP LOGIC ---
        function startBarcodeScanner() {
            document.getElementById('mainFormContainer').classList.add('hidden');
            document.getElementById('scannerSection').classList.remove('hidden');
            
            if (!html5Qrcode) {
                html5Qrcode = new Html5Qrcode("reader");
            }
            
            html5Qrcode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 150 } },
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Camera error:", err);
                showToast('error', 'Camera Error', 'Could not access the camera automatically. Please check permissions.');
                stopBarcodeScanner();
            });
        }

        function stopBarcodeScanner() {
            if (html5Qrcode && html5Qrcode.isScanning) {
                html5Qrcode.stop().then(() => {
                    html5Qrcode.clear();
                }).catch(err => console.error(err));
            }
            document.getElementById('scannerSection').classList.add('hidden');
            document.getElementById('mainFormContainer').classList.remove('hidden');
        }

        async function onScanSuccess(decodedText) {
            stopBarcodeScanner();
            document.getElementById('barcode').value = decodedText;
            lookupBarcode(decodedText);
        }

        function onScanFailure(error) { /* Ignore background scanning errors */ }

        async function lookupBarcodeManual() {
            const val = document.getElementById('barcode').value.trim();
            if (!val) {
                showToast('warning', 'Barcode Missing', 'Please enter a barcode to lookup.');
                return;
            }
            lookupBarcode(val);
        }

        async function lookupBarcode(barcodeValue) {
            const lookupBtn = document.querySelector('.btn-lookup');
            const originalText = lookupBtn.innerText;
            lookupBtn.innerText = '...';
            lookupBtn.disabled = true;

            showToast('info', 'Searching Database', 'Looking up product info...');
            
            try {
                // Tier 1: Query local database first
                const localRes = await fetch(`${API_BASE}/api/products/barcode/${barcodeValue}`, {
                    headers: {
                        ...(getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {})
                    }
                });
                
                if (localRes.ok) {
                    const localData = await localRes.json();
                    if (localData && localData.found) {
                        const p = localData.product;
                        if (p.name && !document.getElementById('productName').value) document.getElementById('productName').value = p.name;
                        if (p.brand && !document.getElementById('brand').value) document.getElementById('brand').value = p.brand;
                        if (p.weight && !document.getElementById('weight').value) document.getElementById('weight').value = p.weight;
                        
                        // Fill category if empty
                        if (p.category) {
                            const catField = document.getElementById('categoryName');
                            if (catField && catField.value.trim() === '') {
                                selectCategory(p.category);
                                if (!categoryList.includes(p.category)) {
                                    categoryList.push(p.category);
                                    renderCategories(categoryList);
                                }
                            }
                        }

                        // Fill prices and select unit if empty
                        if (p.costPrice !== null && !document.getElementById('costPrice').value) document.getElementById('costPrice').value = p.costPrice;
                        if (p.sellingPrice !== null && !document.getElementById('sellingPrice').value) document.getElementById('sellingPrice').value = p.sellingPrice;
                        if (p.unit) autoSelectUnit(p.unit);

                        showToast('success', 'Found Locally! 📦', 'Product details auto-filled from database.');
                        return;
                    }
                }

                // Tier 2: Fallback to global database
                const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcodeValue}.json`);
                const data = await res.json();
                
                if (data && data.product) {
                    const p = data.product;
                    if (p.product_name && !document.getElementById('productName').value) document.getElementById('productName').value = p.product_name;
                    if (p.brands && !document.getElementById('brand').value) document.getElementById('brand').value = p.brands.split(',')[0];
                    if (p.quantity && !document.getElementById('weight').value) document.getElementById('weight').value = p.quantity;
                    showToast('success', 'Found Globally!', 'Product details auto-filled.');
                } else {
                    showToast('warning', 'Not Found', 'Barcode recognized but no data found in global database. Try AI Scan.');
                }
            } catch (err) {
                console.error("Barcode lookup failed:", err);
                showToast('error', 'Lookup Failed', 'Could not fetch product data.');
            } finally {
                lookupBtn.innerText = originalText;
                lookupBtn.disabled = false;
            }
        }

        // --- AI SCANNER LOGIC ---
        function setAIStatus(type, title, message) {
            const banner = document.getElementById('aiStatusBanner');
            const text = document.getElementById('aiStatusText');
            const badge = document.getElementById('aiBadge');

            if (type === 'hidden') {
                banner.classList.add('hidden');
                if (badge) badge.classList.add('hidden');
                return;
            }

            banner.className = `ai-status-banner ${type}`;
            text.innerHTML = `<strong>${title}:</strong> ${message}`;
            banner.classList.remove('hidden');

            // Show AI badge on success or warning
            if (badge) {
                if (type === 'success' || type === 'warning') {
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }

        async function processAIImage(base64Str) {
            const scanBtn = document.getElementById('aiScanBtn');
            const overlay = document.getElementById('aiLoadingOverlay');

            // Show loading state
            overlay.classList.remove('hidden');
            if (scanBtn) scanBtn.disabled = true;

            // Clear previous AI markers (don't clear field values — preserve user edits)
            document.querySelectorAll('[data-ai-filled]').forEach(el => {
                el.removeAttribute('data-ai-filled');
                el.classList.remove('ai-generated');
            });

            console.log("=== AI Scan Start ===");
            console.log("Image length:", base64Str?.length);
            console.log("API Base:", API_BASE);

            const payload = {
               imageBase64: base64Str,
               mimeType: "image/jpeg"
            };

            console.log("Payload:", payload);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000); // 30s timeout

                const response = await fetch(`${API_BASE}/api/scan-product`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {})
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                console.log("Response status:", response.status);

                const rawText = await response.text();

                console.log("Raw response:", rawText);

                let result;

                try{
                   result = JSON.parse(rawText);
                }catch(err){
                   console.error("JSON parse failed:", err);
                }

                if (!response.ok) {
                    let errorMsg = 'Unable to analyze product.';
                    if (response.status === 400) {
                        errorMsg = "Invalid image request";
                    } else if (response.status === 401 || response.status === 403) {
                        errorMsg = "Authentication problem";
                    } else if (response.status === 404) {
                        errorMsg = "AI endpoint not found";
                    } else if (response.status === 429) {
                        errorMsg = "Rate limit exceeded";
                    } else if (response.status === 500) {
                        errorMsg = "Backend AI processing failed";
                    } else {
                        errorMsg = (result && (result.error || result.debug)) || `Server error (${response.status})`;
                    }
                    throw new Error(errorMsg);
                }

                const data = result && (result.data || result);
                if (!data) {
                    throw new Error("No data returned from AI scanner");
                }
                const confidence = parseFloat(data.confidence) || 0;

                // Field-level validation — confidence alone is not enough
                const hasName = !!data.productName;
                const hasCategory = !!data.category;

                // Fill only if field is currently empty (preserve user edits)
                const fillIfEmpty = (id, val) => {
                    const field = document.getElementById(id);
                    if (val && field && field.value.trim() === '') {
                        field.value = val;
                        field.setAttribute('data-ai-filled', 'true');
                        field.classList.add('ai-generated');
                    }
                };

                if (confidence >= 0.8 && hasName) {
                    // High confidence with valid product name
                    fillIfEmpty('productName', data.productName);
                    fillIfEmpty('brand', data.brand);
                    fillIfEmpty('weight', data.weight);
                    fillIfEmpty('barcode', data.barcode);

                    if (hasCategory) {
                        const catField = document.getElementById('categoryName');
                        if (catField && catField.value.trim() === '') {
                            selectCategory(data.category);
                            if (!categoryList.includes(data.category)) {
                                categoryList.push(data.category);
                                renderCategories(categoryList);
                            }
                            autoSelectUnit(getUnitForCategory(data.category));
                        }
                    }

                    setAIStatus('success', 'AI Scan Complete', 'AI detected product information');

                } else if (confidence >= 0.5 && hasName) {
                    // Medium confidence — auto-fill with warning
                    fillIfEmpty('productName', data.productName);
                    fillIfEmpty('brand', data.brand);
                    fillIfEmpty('weight', data.weight);
                    fillIfEmpty('barcode', data.barcode);

                    if (hasCategory) {
                        const catField = document.getElementById('categoryName');
                        if (catField && catField.value.trim() === '') {
                            selectCategory(data.category);
                            if (!categoryList.includes(data.category)) {
                                categoryList.push(data.category);
                                renderCategories(categoryList);
                            }
                            autoSelectUnit(getUnitForCategory(data.category));
                        }
                    }

                    setAIStatus('warning', 'AI Scan', 'Please verify this information');

                } else {
                    // Low confidence or missing key fields — do NOT auto-fill
                    setAIStatus('error', 'Low Confidence', 'Low confidence — please fill manually');
                }

                // Save scan record for training data
                saveScanRecord(base64Str, data, confidence);

            } catch (error) {
                console.error(error);
                alert(error.message);

                showToast('error', 'AI Scan Failed', error.message);
                setAIStatus('hidden');
            } finally {
                overlay.classList.add('hidden');
                if (scanBtn) scanBtn.disabled = false;
            }
        }

        // --- SCAN HISTORY ---
        function saveScanRecord(imageBase64, aiOutput, confidence) {
            try {
                const record = {
                    aiOutput: aiOutput,
                    confidence: confidence,
                    timestamp: Date.now(),
                    imageSnippet: imageBase64.substring(0, 200) // Truncated — full image is too large for localStorage
                };
                const history = JSON.parse(localStorage.getItem('st_scan_history') || '[]');
                history.push(record);
                // Keep last 50 scans to prevent storage overflow
                if (history.length > 50) history.shift();
                localStorage.setItem('st_scan_history', JSON.stringify(history));
            } catch (e) {
                console.warn('Could not save scan record:', e);
            }
        }

        // --- SUBMIT FORM ---
        async function handleSubmit() {
            const name = document.getElementById('productName').value.trim();
            const sellingPrice = document.getElementById('sellingPrice').value;
            const costPrice = document.getElementById('costPrice').value;
            const quantity = document.getElementById('quantity').value;
            const reorderLevel = document.getElementById('reorderLevel').value || '5';
            
            const barcode = document.getElementById('barcode').value.trim();
            const brand = document.getElementById('brand').value.trim();
            const weight = document.getElementById('weight').value.trim();
            const categoryName = document.getElementById('categoryName').value.trim();
            
            const btn = document.getElementById('submitBtn');

            if (!name) {
                showToast('warning', 'Name Required', 'Enter a product name.');
                document.getElementById('productName').focus();
                return;
            }

            if (!costPrice || parseFloat(costPrice) < 0) {
                showToast('warning', 'Cost Price Required', 'Enter a valid cost price.');
                document.getElementById('costPrice').focus();
                return;
            }

            if (!sellingPrice || parseFloat(sellingPrice) <= 0) {
                showToast('warning', 'Selling Price Required', 'Enter a valid selling price.');
                document.getElementById('sellingPrice').focus();
                return;
            }

            if (!quantity || parseInt(quantity) < 0) {
                showToast('warning', 'Quantity Required', 'Enter the stock quantity.');
                document.getElementById('quantity').focus();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Saving...';

            try {
                await apiRequest('/api/products', {
                    method: 'POST',
                    body: JSON.stringify({
                        name,
                        sellingPrice: parseFloat(sellingPrice),
                        costPrice: parseFloat(costPrice),
                        quantity: parseInt(quantity),
                        reorderLevel: parseInt(reorderLevel),
                        unit: selectedUnit,
                        barcode: barcode || null,
                        brand: brand || null,
                        weight: weight || null,
                        categoryName: categoryName || null,
                        image: aiImageBase64 || null
                    })
                });

                showToast('success', 'Product Saved! 📦', `${name} has been added to your inventory.`);

                // Reset and reload
                setTimeout(() => {
                    location.reload();
                }, 1500);

            } catch (err) {
                showToast('error', 'Failed', err.message);
                btn.disabled = false;
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Save Product';
            }
        }
    </script>
