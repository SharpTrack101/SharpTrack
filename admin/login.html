<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack Admin — Secure Portal Login</title>
    <meta name="description" content="Secure administrative access gateway for the SharpTrack enterprise platform.">
    <link rel="icon" type="image/png" href="../logo2.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #06070a;
            --card-bg: rgba(16, 18, 27, 0.45);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.25);
            --secondary: #6366f1;
            --danger: #ef4444;
            --font-heading: 'Outfit', 'Plus Jakarta Sans', system-ui, sans-serif;
            --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow-premium: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            --glass-blur: blur(16px) saturate(180%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Backgrounds */
        .ambient-glow-1 {
            position: absolute;
            top: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(16, 185, 129, 0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* Glassmorphic Card Container */
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-premium);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            z-index: 10;
            animation: formFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes formFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-img {
            height: 42px;
            margin-bottom: 16px;
            filter: brightness(1.2);
        }

        .title {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13.5px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 12px 16px 12px 42px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            background-color: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.25s ease;
        }

        .form-input:focus + .input-icon {
            color: var(--primary);
        }

        /* Error Alert Box */
        .error-alert {
            display: none;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 24px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
            border: none;
            border-radius: var(--radius-md);
            padding: 14px;
            color: #ffffff;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 14.5px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="login-container">
        <div class="header">
            <img src="../logo2.png" alt="SharpTrack Logo" class="logo-img">
            <h1 class="title">SharpTrack Portal</h1>
            <p class="subtitle">Enter credentials to unlock administrative console</p>
        </div>

        <div class="error-alert" id="error-alert"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-input" placeholder="admin@sharptrack.com.ng" required autocomplete="username">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="••••••••••••" required autocomplete="current-password">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">Authenticate Session</span>
            </button>
        </form>

        <div class="footer-text">
            <span>SharpTrack Administrative Gateways. Authorized personnel only.</span>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');
            const submitBtn = document.getElementById('btn-submit');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btn-text');

            // Hide previous errors
            errorAlert.style.display = 'none';

            // Show loading state
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Verifying...';

            try {
                const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? ''
                    : 'https://sharptrack-api.onrender.com';

                const response = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed. Please check your credentials.');
                }

                // Store token in localStorage for the dashboard to use
                if (data.token) {
                    localStorage.setItem('admin_token', data.token);
                }

                // Successful login, redirect to index
                btnText.textContent = 'Redirecting...';
                window.location.href = '/admin/index.html';
            } catch (err) {
                // Display error
                errorAlert.textContent = err.message;
                errorAlert.style.display = 'block';
                // Trigger shake animation
                errorAlert.style.animation = 'none';
                errorAlert.offsetHeight; // Reflow
                errorAlert.style.animation = 'shake 0.4s ease-in-out';

                // Reset button
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Authenticate Session';
            }
        });
    </script>
</body>
</html>
