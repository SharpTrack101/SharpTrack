<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Business Analytics</title>
    <meta name="description" content="View detailed shop performance, revenue, costs, and profits over daily, weekly, and monthly ranges.">
    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { padding-bottom: 90px; }
        
        .header-section {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-title h1 {
            font-size: 24px;
            font-weight: 800;
        }
        
        .header-title p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 3px;
        }

        /* Tabs styling */
        .analytics-tabs {
            display: flex;
            background: var(--border-light);
            border-radius: var(--radius-md);
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: transparent;
            font-family: var(--font-family);
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
        }
        
        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* Metric cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .metric-card:active {
            transform: scale(0.98);
        }

        .metric-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .metric-icon.green { background: var(--green-bg); color: var(--green); }
        .metric-icon.blue { background: var(--blue-bg); color: var(--blue); }
        .metric-icon.orange { background: var(--orange-bg); color: var(--orange); }

        .metric-details {
            flex: 1;
            min-width: 0;
        }
        
        .metric-details .label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-weight: 700;
        }
        
        .metric-details .value {
            font-size: 20px;
            font-weight: 800;
            margin-top: 2px;
            color: var(--text);
        }
        
        .metric-details .trend-badge {
            font-size: 11.5px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin-top: 4px;
        }
        
        .trend-badge.up { color: var(--green); }
        .trend-badge.down { color: var(--red); }
        .trend-badge.flat { color: var(--muted); }

        /* Chart container */
        .chart-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .chart-header h2 {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .chart-legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .legend-color {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        
        .legend-color.rev { background: #25a060; }
        .legend-color.prof { background: #e07b2a; }

        .canvas-container {
            position: relative;
            height: 220px;
            width: 100%;
        }

        /* Products list */
        .breakdown-section {
            margin-bottom: 20px;
        }
        
        .breakdown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .breakdown-header h2 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .breakdown-header span {
            font-size: 11.5px;
            color: var(--muted);
        }

        .product-performance-list {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .perf-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .perf-item:last-child {
            border-bottom: none;
        }
        
        .perf-img {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-md);
            background: var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .perf-info {
            flex: 1;
            min-width: 0;
        }
        
        .perf-info .name {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .perf-info .sales-qty {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }
        
        .perf-metrics {
            text-align: right;
            flex-shrink: 0;
        }
        
        .perf-metrics .profit {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--green);
        }
        
        .perf-metrics .margin-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--green-bg);
            color: var(--green);
            margin-top: 3px;
        }
        
        .perf-metrics .margin-badge.low {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .perf-metrics .rev-small {
            font-size: 10.5px;
            color: var(--muted);
            margin-top: 2px;
        }

        .empty-breakdown {
            padding: 40px 20px;
            text-align: center;
            color: var(--muted);
        }
        
        .empty-breakdown svg {
            width: 36px;
            height: 36px;
            margin-bottom: 8px;
            color: var(--border);
        }
    </style>
</head>
<body>

    <!-- Content Area -->
    <div class="content" id="main-content">
        
        <!-- HEADER -->
        <div class="header-section">
            <div class="header-title">
                <h1>Analytics Board</h1>
                <p id="analytics-date-range">Calculating your performance...</p>
            </div>
            <button class="bell-btn" onclick="window.location.href='dashboard.html'" aria-label="Go Back" title="Back to Dashboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
        </div>

        <!-- RANGE TABS -->
        <div class="analytics-tabs">
            <button class="tab-btn active" id="tab-day" onclick="switchRange('day')">Today</button>
            <button class="tab-btn" id="tab-week" onclick="switchRange('week')">Weekly</button>
            <button class="tab-btn" id="tab-month" onclick="switchRange('month')">Monthly</button>
        </div>

        <!-- METRIC CARDS -->
        <div class="metrics-grid" id="metrics-container">
            <!-- Revenue Card -->
            <div class="metric-card animate-fadeUp">
                <div class="metric-icon green">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                </div>
                <div class="metric-details">
                    <div class="label">Total Revenue</div>
                    <div class="value" id="revenue-val">₦0.00</div>
                    <div class="trend-badge" id="revenue-trend">Loading...</div>
                </div>
            </div>

            <!-- Cost Card -->
            <div class="metric-card animate-fadeUp" style="animation-delay: 0.05s;">
                <div class="metric-icon blue">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div class="metric-details">
                    <div class="label">Total Cost</div>
                    <div class="value" id="cost-val">₦0.00</div>
                    <div class="trend-badge flat" id="cost-sub">Cost of stock sold</div>
                </div>
            </div>

            <!-- Profit/Net Gains Card -->
            <div class="metric-card animate-fadeUp" style="animation-delay: 0.1s;">
                <div class="metric-icon orange">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                </div>
                <div class="metric-details">
                    <div class="label">Net Gain (Profit)</div>
                    <div class="value" id="gain-val">₦0.00</div>
                    <div class="trend-badge" id="gain-trend">Loading...</div>
                </div>
            </div>
        </div>

        <!-- TREND GRAPH -->
        <div class="chart-section animate-fadeUp" style="animation-delay: 0.15s;">
            <div class="chart-header">
                <h2>Trend Graph</h2>
                <div class="chart-legend">
                    <div class="legend-item"><div class="legend-color rev"></div><span>Revenue</span></div>
                    <div class="legend-item"><div class="legend-color prof"></div><span>Net Gain</span></div>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <!-- PRODUCTS BREAKDOWN -->
        <div class="breakdown-section animate-fadeUp" style="animation-delay: 0.2s;">
            <div class="breakdown-header">
                <h2 id="breakdown-title">Gain Breakdown by Product</h2>
                <span id="breakdown-subtitle">Sorted by net gain</span>
            </div>
            <div class="product-performance-list" id="product-list-container">
                <div class="empty-breakdown">
                    <svg class="animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:28px;height:28px;"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-width="3"/></svg>
                    <p style="margin-top: 10px;">Aggregating product margins...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Bottom Nav & Application Scripts -->
    <script src="js/app.js"></script>
    <script>
        let currentRange = 'day';
        let chartInstance = null;

        if (!initPage('analytics')) {
            // Redirected to auth if not logged in
        } else {
            injectNavbar();
            injectBottomNav('more'); // Highlight settings tab or keep it default
            
            // Set navbar avatar initials from session
            const user = getUser();
            if (user) {
                document.getElementById('nav-avatar-initials').textContent = getUserInitials(user.name);
            }

            // Initial data fetch
            loadAnalyticsData('day');
        }

        function switchRange(range) {
            if (currentRange === range) return;
            currentRange = range;
            
            // Update active tab UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`tab-${range}`).classList.add('active');
            
            loadAnalyticsData(range);
        }

        async function loadAnalyticsData(range) {
            try {
                // Show loading skeleton states or spinner
                document.getElementById('product-list-container').innerHTML = `
                    <div class="empty-breakdown">
                        <svg class="animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-width="2.5"/></svg>
                        <p style="margin-top: 8px; font-size:13px;">Computing data ranges...</p>
                    </div>
                `;

                const tzOffset = new Date().getTimezoneOffset();
                const res = await apiRequest(`/api/sales/analytics?range=${range}&timezoneOffset=${tzOffset}`);
                
                renderMetrics(res.currentPeriod, range);
                renderChart(res.chartData, range);
                renderProductBreakdown(res.productBreakdown);
                updateDateLabel(range);

            } catch (err) {
                showToast('error', 'Calculation Error', err.message);
            }
        }

        function updateDateLabel(range) {
            const labelEl = document.getElementById('analytics-date-range');
            const now = new Date();
            
            if (range === 'day') {
                labelEl.textContent = `Today: ${now.toLocaleDateString('en-NG', { weekday: 'long', day: 'numeric', month: 'short' })}`;
            } else if (range === 'week') {
                const prev = new Date(now.getTime() - (6 * 24 * 60 * 60 * 1000));
                labelEl.textContent = `${prev.toLocaleDateString('en-NG', { day: 'numeric', month: 'short' })} — ${now.toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' })}`;
            } else if (range === 'month') {
                const prev = new Date(now.getTime() - (29 * 24 * 60 * 60 * 1000));
                labelEl.textContent = `${prev.toLocaleDateString('en-NG', { day: 'numeric', month: 'short' })} — ${now.toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' })}`;
            }
        }

        function renderMetrics(period, range) {
            document.getElementById('revenue-val').textContent = formatCurrency(period.revenue);
            document.getElementById('cost-val').textContent = formatCurrency(period.cost);
            document.getElementById('gain-val').textContent = formatCurrency(period.gain);

            const revTrend = document.getElementById('revenue-trend');
            const gainTrend = document.getElementById('gain-trend');
            
            const periodText = range === 'day' ? 'vs yesterday' : range === 'week' ? 'vs last week' : 'vs last month';

            // Revenue trend badge
            if (period.revenueChangePercent > 0) {
                revTrend.className = 'trend-badge up';
                revTrend.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg> +${period.revenueChangePercent}% ${periodText}`;
            } else if (period.revenueChangePercent < 0) {
                revTrend.className = 'trend-badge down';
                revTrend.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg> ${period.revenueChangePercent}% ${periodText}`;
            } else {
                revTrend.className = 'trend-badge flat';
                revTrend.textContent = `0% change ${periodText}`;
            }

            // Profit / Gain trend badge
            if (period.gainChangePercent > 0) {
                gainTrend.className = 'trend-badge up';
                gainTrend.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg> +${period.gainChangePercent}% ${periodText}`;
            } else if (period.gainChangePercent < 0) {
                gainTrend.className = 'trend-badge down';
                gainTrend.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg> ${period.gainChangePercent}% ${periodText}`;
            } else {
                gainTrend.className = 'trend-badge flat';
                gainTrend.textContent = `0% change ${periodText}`;
            }
        }

        function renderChart(chartData, range) {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            
            const labels = chartData.map(d => d.label);
            const revenues = chartData.map(d => d.revenue);
            const gains = chartData.map(d => d.gain);

            if (chartInstance) {
                chartInstance.destroy();
            }

            // Detect theme and set appropriate chart colors
            const theme = getTheme();
            const gridColor = theme === 'dark' ? '#2d3a34' : '#e8e3d8';
            const textColor = theme === 'dark' ? '#7a9486' : '#7a8880';

            // Create linear gradients for area fill
            const revGrad = ctx.createLinearGradient(0, 0, 0, 200);
            revGrad.addColorStop(0, 'rgba(37, 160, 96, 0.25)');
            revGrad.addColorStop(1, 'rgba(37, 160, 96, 0.01)');

            const gainGrad = ctx.createLinearGradient(0, 0, 0, 200);
            gainGrad.addColorStop(0, 'rgba(224, 123, 42, 0.25)');
            gainGrad.addColorStop(1, 'rgba(224, 123, 42, 0.01)');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Revenue',
                            data: revenues,
                            borderColor: '#25a060',
                            borderWidth: 2.5,
                            backgroundColor: revGrad,
                            fill: true,
                            tension: 0.35,
                            pointRadius: range === 'month' ? 0.5 : 2,
                            pointHoverRadius: 5,
                            pointBackgroundColor: '#25a060'
                        },
                        {
                            label: 'Net Gain',
                            data: gains,
                            borderColor: '#e07b2a',
                            borderWidth: 2.5,
                            backgroundColor: gainGrad,
                            fill: true,
                            tension: 0.35,
                            pointRadius: range === 'month' ? 0.5 : 2,
                            pointHoverRadius: 5,
                            pointBackgroundColor: '#e07b2a'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: theme === 'dark' ? '#1a201c' : '#ffffff',
                            titleColor: theme === 'dark' ? '#e8efe9' : '#1a2e26',
                            bodyColor: theme === 'dark' ? '#b0c4b8' : '#3d5a4e',
                            borderColor: gridColor,
                            borderWidth: 1,
                            padding: 10,
                            titleFont: { family: 'Inter', weight: '700', size: 12 },
                            bodyFont: { family: 'Inter', size: 11.5 },
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += '₦' + context.parsed.y.toLocaleString('en-NG', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: textColor,
                                font: { family: 'Inter', size: 9, weight: '500' },
                                maxTicksLimit: range === 'month' ? 8 : 12
                            }
                        },
                        y: {
                            grid: { color: gridColor },
                            ticks: {
                                color: textColor,
                                font: { family: 'Inter', size: 9 },
                                callback: function(value) {
                                    if (value >= 1000000) return '₦' + (value / 1000000).toFixed(1) + 'M';
                                    if (value >= 1000) return '₦' + (value / 1000).toFixed(0) + 'k';
                                    return '₦' + value;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderProductBreakdown(breakdown) {
            const container = document.getElementById('product-list-container');
            
            if (!breakdown || breakdown.length === 0) {
                container.innerHTML = `
                    <div class="empty-breakdown">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:36px;height:36px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p style="margin-top: 8px; font-size:13.5px;">No product gains recorded in this range.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = breakdown.map((p, i) => {
                const imageHtml = p.image 
                    ? `<img src="${p.image}" alt="${p.productName}" style="width:100%; height:100%; object-fit:cover; border-radius:var(--radius-md);">`
                    : `📦`;

                // Color code margins
                const marginClass = p.margin < 20 ? 'low' : '';

                return `
                    <div class="perf-item animate-slideUp" style="animation-delay: ${i * 0.03}s;">
                        <div class="perf-img">${imageHtml}</div>
                        <div class="perf-info">
                            <div class="name">${p.productName}</div>
                            <div class="sales-qty">Sold: ${p.quantitySold} ${p.unit || 'pcs'} | Cost: ₦${Math.round(p.costPrice).toLocaleString()}</div>
                        </div>
                        <div class="perf-metrics">
                            <div class="profit">+${formatCurrency(p.gain)}</div>
                            <div class="margin-badge ${marginClass}">${p.margin}% margin</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Listen for theme change events to redraw chart dynamically
        const handleThemeChange = () => {
            if (chartInstance) {
                setTimeout(() => {
                    if (currentRange) loadAnalyticsData(currentRange);
                }, 100);
            }
        };
        window.addEventListener('storage', (e) => {
            if (e.key === 'st_theme') handleThemeChange();
        });
        window.addEventListener('themeChanged', handleThemeChange);
    </script>
</body>
</html>
