<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Dashboard</title>
    <meta name="description" content="Your SharpTrack business dashboard — view sales, inventory and quick actions.">
    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body { padding-bottom: 90px; }
        .greeting { margin-bottom: 20px; }
        .greeting h1 { font-size: 24px; }
        .greeting p { font-size: 14px; color: var(--muted); margin-top: 3px; }

        .welcome-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .sale-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .sale-item:last-child { border-bottom: none; padding-bottom: 0; }
        .sale-item:first-child { padding-top: 0; }

        .sale-img {
            width: 44px; height: 44px;
            border-radius: var(--radius-md);
            background: var(--border-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .sale-info { flex: 1; min-width: 0; }
        .sale-info .name { font-size: 14px; font-weight: 600; color: var(--text); }
        .sale-info .qty { font-size: 12px; color: var(--muted); margin-top: 2px; }

        .sale-meta { text-align: right; flex-shrink: 0; }
        .sale-meta .amount { font-size: 14px; font-weight: 700; color: var(--text); }
        .sale-meta .time { font-size: 12px; color: var(--muted); margin-top: 2px; }

        .quick-actions { margin-bottom: 20px; }
        .quick-actions h2 {
            font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
            text-transform: uppercase; margin-bottom: 12px;
        }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .action-btn {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: none;
            text-align: left;
            font-family: var(--font-family);
            transition: transform 0.1s, background-color 0.2s;
        }
        .action-btn:active { transform: scale(0.97); }

        .action-icon {
            width: 42px; height: 42px;
            background: var(--primary-light);
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
        }

        .action-text .title { font-size: 14px; font-weight: 700; color: var(--primary); }
        .action-text .sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: normal; word-break: break-word; }

        .activity-section { margin-bottom: 20px; }
        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
        }
        .activity-text { flex: 1; font-size: 13px; color: var(--text); }
        .activity-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    </style>
</head>
<body>

    <!-- Navbar injected by JS -->

    <!-- CONTENT -->
    <div class="content" id="main-content">

        <!-- WELCOME -->
        <div class="welcome-row">
            <div class="avatar" id="user-avatar">?</div>
            <div class="greeting">
                <h1 id="greeting-text">Loading...</h1>
                <p id="greeting-sub">Loading your business data...</p>
            </div>
        </div>

        <!-- STAT CARDS -->
        <div class="stat-cards" id="stat-cards" style="grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px;">
            <div class="skeleton skeleton-stat" style="height: 100px;"></div>
            <div class="dashboard-stats-grid">
                <div class="skeleton skeleton-stat"></div>
                <div class="skeleton skeleton-stat"></div>
            </div>
        </div>

        <!-- WEEKLY SALES TREND -->
        <div class="section analytics-section">
            <div class="section-header">
                <h2>Weekly Sales Trend</h2>
            </div>
            <div class="chart-container" id="weekly-chart-container">
                <div class="chart-bars" id="weekly-chart-bars">
                    <div style="width:100%;height:100%;display:flex;align-items:flex-end;justify-content:space-around;padding:0 8px;">
                        <div class="skeleton" style="width:20px;height:40px;border-radius:4px 4px 0 0;"></div>
                        <div class="skeleton" style="width:20px;height:80px;border-radius:4px 4px 0 0;"></div>
                        <div class="skeleton" style="width:20px;height:50px;border-radius:4px 4px 0 0;"></div>
                        <div class="skeleton" style="width:20px;height:90px;border-radius:4px 4px 0 0;"></div>
                        <div class="skeleton" style="width:20px;height:30px;border-radius:4px 4px 0 0;"></div>
                        <div class="skeleton" style="width:20px;height:70px;border-radius:4px 4px 0 0;"></div>
                        <div class="skeleton" style="width:20px;height:100px;border-radius:4px 4px 0 0;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TOP SELLING PRODUCTS -->
        <div class="section">
            <div class="section-header">
                <h2>Top-Selling Products</h2>
            </div>
            <div id="top-selling-products">
                <div class="skeleton skeleton-text w-75" style="margin: 8px 0;"></div>
                <div class="skeleton skeleton-text w-50" style="margin: 8px 0;"></div>
            </div>
        </div>


        <!-- RECENT SALES -->
        <div class="section">
            <div class="section-header">
                <h2>Recent Sales</h2>
                <a href="record-sale.html" class="view-all">View all ›</a>
            </div>
            <div id="recent-sales">
                <div style="display:flex;gap:12px;align-items:center;padding:12px 0;">
                    <div class="skeleton skeleton-circle" style="width:44px;height:44px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="skeleton skeleton-text w-75"></div><div class="skeleton skeleton-text w-40"></div></div>
                </div>
                <div style="display:flex;gap:12px;align-items:center;padding:12px 0;">
                    <div class="skeleton skeleton-circle" style="width:44px;height:44px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="skeleton skeleton-text w-75"></div><div class="skeleton skeleton-text w-40"></div></div>
                </div>
                <div style="display:flex;gap:12px;align-items:center;padding:12px 0;">
                    <div class="skeleton skeleton-circle" style="width:44px;height:44px;flex-shrink:0;"></div>
                    <div style="flex:1;"><div class="skeleton skeleton-text w-75"></div><div class="skeleton skeleton-text w-40"></div></div>
                </div>
            </div>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="quick-actions">
            <h2>Quick Actions</h2>
            <div class="action-grid">
                <button class="action-btn" onclick="window.location.href='record-sale.html'">
                    <div class="action-icon">
                        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    </div>
                    <div class="action-text">
                        <div class="title">Add Sale</div>
                        <div class="sub">Record a new sale</div>
                    </div>
                </button>
                <button class="action-btn" onclick="window.location.href='add-stock.html'">
                    <div class="action-icon">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                    </div>
                    <div class="action-text">
                        <div class="title">Add Stock</div>
                        <div class="sub">Add new inventory</div>
                    </div>
                </button>
            </div>
        </div>

        <!-- RECENT ACTIVITY -->
        <div class="section activity-section">
            <div class="section-header">
                <h2>Recent Activity</h2>
            </div>
            <div id="activity-log">
                <div class="skeleton skeleton-text w-75" style="margin-bottom:12px;"></div>
                <div class="skeleton skeleton-text w-50" style="margin-bottom:12px;"></div>
                <div class="skeleton skeleton-text w-75"></div>
            </div>
        </div>

    </div>

    <!-- Bottom nav injected by JS -->

    <script src="js/app.js"></script>
    <script src="js/onboarding.js"></script>
    <script>
        if (!initPage('dashboard')) { /* redirected */ }
        else {
            injectNavbar();
            injectBottomNav('dashboard');
            loadDashboard();
            
            // Check if user needs onboarding walkthrough
            setTimeout(() => {
                const cachedUser = getUser();
                if (localStorage.getItem('onboardingComplete') !== 'true' || (cachedUser && cachedUser.onboardingCompleted === false)) {
                    if (typeof startOnboardingTour === 'function') {
                        startOnboardingTour();
                    }
                }
            }, 800);
        }

        async function loadDashboard() {
            const user = getUser();

            // Set greeting immediately from cached data
            if (user) {
                document.getElementById('greeting-text').textContent = `${getGreeting()}, ${getUserFirstName(user.name)}! 👋`;
                document.getElementById('greeting-sub').textContent = "Here's what's happening with your business today.";
                document.getElementById('user-avatar').textContent = getUserInitials(user.name);
            }

            // Fetch fresh data in parallel
            try {
                const tzOffset = new Date().getTimezoneOffset();
                const [salesData, productStats, recentSales, activityData, userData, weeklyData, topProductsData] = await Promise.allSettled([
                    apiRequest(`/api/sales/today?timezoneOffset=${tzOffset}`),
                    apiRequest('/api/products/stats'),
                    apiRequest('/api/sales/recent'),
                    apiRequest('/api/activity?limit=5'),
                    apiRequest('/api/auth/me'),
                    apiRequest(`/api/sales/weekly?timezoneOffset=${tzOffset}`),
                    apiRequest('/api/sales/top-products')
                ]);

                // Update user info if fresh data available
                if (userData.status === 'fulfilled') {
                    const u = userData.value.user;
                    localStorage.setItem('st_user', JSON.stringify(u));
                    document.getElementById('greeting-text').textContent = `${getGreeting()}, ${getUserFirstName(u.name)}! 👋`;
                    document.getElementById('user-avatar').textContent = getUserInitials(u.name);
                }

                // Stat cards
                renderStatCards(
                    salesData.status === 'fulfilled' ? salesData.value : null,
                    productStats.status === 'fulfilled' ? productStats.value : null
                );

                // Weekly Chart
                renderWeeklyChart(weeklyData.status === 'fulfilled' ? weeklyData.value.weekly : []);

                // Top Selling Products
                renderTopSellingProducts(topProductsData.status === 'fulfilled' ? topProductsData.value.topProducts : []);

                // Recent sales
                renderRecentSales(recentSales.status === 'fulfilled' ? recentSales.value.sales : []);

                // Activity log
                renderActivity(activityData.status === 'fulfilled' ? activityData.value.activities : []);

            } catch (err) {
                showToast('error', 'Loading Failed', err.message);
            }
        }

        function renderStatCards(sales, products) {
            const container = document.getElementById('stat-cards');
            const todayTotal = sales ? sales.total : 0;
            const pctChange = sales ? sales.percentChange : 0;
            const lowStock = products ? products.lowStockCount : 0;
            const inventoryValue = products ? products.totalValue : 0;

            container.innerHTML = `
                <div class="stat-card animate-fadeUp" style="grid-column: 1 / -1;">
                    <div class="stat-icon green">
                        <svg class="icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    </div>
                    <div class="label">Today's Sales</div>
                    <div class="value" style="font-size: 26px;">${formatCurrency(todayTotal)}</div>
                    <div class="sub ${pctChange >= 0 ? 'up' : 'down'}">
                        ${pctChange !== 0 ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="${pctChange >= 0 ? '18 15 12 9 6 15' : '6 9 12 15 18 9'}"/></svg>
                        ${Math.abs(pctChange)}% vs yesterday` : 'No data from yesterday'}
                    </div>
                </div>
                <div class="dashboard-stats-grid" style="grid-column: 1 / -1;">
                    <div class="stat-card animate-fadeUp" style="animation-delay:0.05s;">
                        <div class="stat-icon blue">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </div>
                        <div class="label">Stock Value</div>
                        <div class="value" style="font-size: 16px;">${formatCurrency(inventoryValue)}</div>
                        <div class="sub">Total asset value</div>
                    </div>
                    <div class="stat-card ${lowStock > 0 ? 'alert' : ''} animate-fadeUp" style="animation-delay:0.1s;">
                        <div class="stat-icon ${lowStock > 0 ? 'orange' : 'green'}">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                        </div>
                        <div class="label">Low Stock</div>
                        <div class="value" style="font-size: 16px;">${lowStock} items</div>
                        <div class="sub">${lowStock > 0 ? 'Restock needed' : 'All good!'}</div>
                    </div>
                </div>
            `;
        }

        function renderWeeklyChart(weeklySales) {
            const container = document.getElementById('weekly-chart-bars');
            if (!container) return;

            if (!weeklySales || weeklySales.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);width:100%;">No sales trend data yet</div>`;
                return;
            }

            const maxAmount = Math.max(...weeklySales.map(d => d.amount), 1000); // Minimum scale of ₦1,000

            container.innerHTML = weeklySales.map(d => {
                const heightPercent = Math.max((d.amount / maxAmount) * 100, 4); // Min 4% height so bar is visible
                return `
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar-tooltip">₦${formatNumber(Math.round(d.amount))}</div>
                        <div class="chart-bar" style="height: ${heightPercent}%;"></div>
                        <div class="chart-label">${d.dayName}</div>
                    </div>
                `;
            }).join('');
        }

        function renderTopSellingProducts(topProducts) {
            const container = document.getElementById('top-selling-products');
            if (!container) return;

            if (!topProducts || topProducts.length === 0) {
                container.innerHTML = `<div style="text-align:center;padding:16px 0;color:var(--muted);font-size:13px;">No sales recorded yet.</div>`;
                return;
            }

            container.innerHTML = topProducts.map((p, i) => {
                const imageHtml = p.image 
                    ? `<img src="${p.image}" alt="${p.name}" style="width:100%; height:100%; object-fit:cover; border-radius:var(--radius-md);">`
                    : `🔥`;

                return `
                <div class="list-item animate-slideUp" style="animation-delay:${i * 0.05}s;">
                    <div class="list-item-img" style="overflow:hidden;">${imageHtml}</div>
                    <div class="list-item-info">
                        <div class="name">${p.name}</div>
                        <div class="sub">Sold: ${p.quantity} ${p.unit || 'pcs'}</div>
                    </div>
                    <div class="list-item-meta">
                        <div class="amount" style="color: var(--primary);">${formatCurrency(p.revenue)}</div>
                        <div class="time">Revenue</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderRecentSales(sales) {
            const container = document.getElementById('recent-sales');

            if (!sales || sales.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        </div>
                        <h3>No sales recorded yet.</h3>
                        <p>Record your first sale to see it appear here.</p>
                        <button class="btn btn-primary btn-sm" onclick="window.location.href='record-sale.html'">Record Sale</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = sales.map((s, i) => {
                const imageHtml = (s.product && s.product.image) 
                    ? `<img src="${s.product.image}" alt="${s.product.name}" style="width:100%; height:100%; object-fit:cover; border-radius:var(--radius-md);">`
                    : `📦`;

                return `
                <div class="sale-item animate-slideUp" style="animation-delay:${i * 0.05}s;">
                    <div class="sale-img" style="overflow:hidden;">${imageHtml}</div>
                    <div class="sale-info">
                        <div class="name">${s.product ? s.product.name : 'Unknown Product'}</div>
                        <div class="qty">${s.quantitySold} ${s.product ? s.product.unit : 'units'}</div>
                    </div>
                    <div class="sale-meta">
                        <div class="amount">${formatCurrency(s.totalAmount)}</div>
                        <div class="time">${formatTime(s.soldAt)}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderActivity(activities) {
            const container = document.getElementById('activity-log');

            if (!activities || activities.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:16px 0;color:var(--muted);font-size:13px;">
                        No recent activity to show.
                    </div>
                `;
                return;
            }

            const actionLabels = {
                'login': '🔑 Signed in',
                'account_created': '🎉 Account created',
                'profile_updated': '✏️ Profile updated',
                'pin_changed': '🔒 PIN changed',
                'product_added': '📦 Product added',
                'sale_recorded': '💰 Sale recorded'
            };

            container.innerHTML = activities.map((a, i) => `
                <div class="activity-item animate-slideUp" style="animation-delay:${i * 0.05}s;">
                    <div class="activity-dot"></div>
                    <div class="activity-text">${actionLabels[a.action] || a.action}${a.details ? ' — ' + a.details : ''}</div>
                    <div class="activity-time">${timeAgo(a.createdAt)}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
