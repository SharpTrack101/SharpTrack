<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack Login</title>
    <style>
        :root {
            --primary: #0a4d33;
            --primary-dark: #083b27;
            --bg: #f0ebe0;
            --card-bg: #ffffff;
            --border: #e8e3d8;
            --text: #1a2e26;
            --muted: #7a8880;
            --orange: #e07b2a;
            --orange-bg: #fdf3ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at bottom right, rgba(10, 77, 51, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(10, 77, 51, 0.08) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 90px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 1;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo Styling */
        .logo-section {
            margin-bottom: 40px;
        }

        .logo-img {
            width: 280px;
            max-width: 100%;
            height: auto;
            mix-blend-mode: multiply;
        }

        /* Form Styling */
        .login-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 45px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background-color: #fafaf8;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .input-wrapper input::placeholder {
            color: var(--muted);
            opacity: 0.7;
        }

        /* PIN input numeric spacing */
        input[inputmode="numeric"] {
            letter-spacing: 4px;
            font-weight: 600;
        }

        input[inputmode="numeric"]::placeholder {
            letter-spacing: normal;
            font-weight: 400;
        }

        .icon-left {
            position: absolute;
            left: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .icon-right {
            position: absolute;
            right: 15px;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .icon-right:hover {
            opacity: 0.7;
        }

        .icon-right:active {
            transform: scale(0.95);
        }

        /* Sign In Button */
        .signin-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 16px rgba(10, 77, 51, 0.2);
        }

        .signin-btn:hover {
            background-color: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(10, 77, 51, 0.3);
        }

        .signin-btn:active {
            transform: scale(0.97);
        }

        /* Footer */
        .footer-text {
            margin-top: 30px;
            font-size: 14px;
            color: var(--muted);
            font-weight: 500;
        }

        .create-account {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .create-account:hover {
            text-decoration: underline;
            color: var(--primary-dark);
        }

        /* SVG Icons */
        .svg-icon {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <div class="logo-section">
            <img src="logo2.png" alt="SharpTrack Logo" class="logo-img">
        </div>

        <!-- Login Form Container (No <form> tag) -->
        <div class="login-form">
            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    </span>
                    <input type="tel" id="phone" placeholder="0801-234-5678" autocomplete="tel">
                </div>
            </div>

            <div class="form-group">
                <label>PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="svg-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" id="pin" placeholder="Enter 6-digit PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password">
                    <span class="icon-right" onclick="toggleVisibility('pin', this)">
                        <svg class="svg-icon" id="pin-eye" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="button" class="signin-btn" onclick="async function handleSignup() {
               // Before sending to backend, save data and send OTP
                const signupData = { name: firstName + ' ' + lastName, phone, pin };
                localStorage.setItem('pendingSignup', JSON.stringify(signupData));

                // Send OTP first
                const otpRes = await fetch('https://sharptrack-api.onrender.com/api/otp/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });

                const otpData = await otpRes.json();

                if (otpRes.ok) {
                    window.location.href = 'verify.html';
                } else {
                    alert(otpData.error || 'Failed to send OTP');
                }
            
                if (!firstName || !lastName || !phone || !pin || !confirmPin) {
                    alert('Please fill in all fields.'); return;
                }
                if (!/^\d{6}$/.test(pin)) {
                    alert('PIN must be exactly 6 digits.'); return;
                }
                if (pin !== confirmPin) {
                    alert('PINs do not match.'); return;
                }
            
                try {
                    const response = await fetch('https://sharptrack-api.onrender.com/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            name: firstName + ' ' + lastName, 
                            phone, 
                            pin 
                        })
                    });
            
                    const data = await response.json();
            
                    if (response.ok) {
                        alert('Account created successfully!');
                        window.location.href = 'index.html';
                    } else {
                        alert(data.error || 'Registration failed');
                    }
            
                } catch (err) {
                    alert('Cannot connect to server. Make sure the server is running.');
                }
            }">Sign In</button>
        </div>

        <div class="footer-text">
            Don't have an account? <a href="signup.html" class="create-account">Create Account</a>
        </div>
    </div>

    <script>
        function toggleVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.getAttribute('type') === 'password';
            input.setAttribute('type', isPassword ? 'text' : 'password');

            // Swap icon between eye-off and eye
            btn.innerHTML = isPassword
                ? `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                   </svg>`
                : `<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                   </svg>`;
        }

        function handleLogin() {
            const phone = document.getElementById('phone').value.trim();
            const pin = document.getElementById('pin').value.trim();

            if (!phone || !pin) {
                alert('Please enter your Phone Number and PIN.');
                return;
            }

            if (pin.length !== 6 || !/^\d+$/.test(pin)) {
                alert('PIN must be exactly 6 digits.');
                return;
            }

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        }
    </script>
    <script>
        document.querySelector('.signin-btn').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value.trim();
            const pin = document.getElementById('pin').value.trim();
    
            if (!phone || !pin) {
                alert('Please enter your phone number and PIN');
                return;
            }
    
            try {
                const response = await fetch('https://sharptrack-api.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, pin })
                });
    
                const data = await response.json();
    
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Login failed');
                }
    
            } catch (err) {
                alert('Cannot connect to server. Make sure the server is running.');
            }
        });
    </script>
</body>
</html>
