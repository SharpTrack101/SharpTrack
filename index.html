<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Sign In</title>
    <meta name="description" content="Sign in to SharpTrack to manage your inventory, track sales, and grow your business.">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at bottom right, rgba(10, 77, 51, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(10, 77, 51, 0.08) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeUp 0.4s ease both;
        }

        .logo-section { margin-bottom: 36px; }
        .logo-img { width: 260px; max-width: 100%; height: auto; mix-blend-mode: multiply; }

        [data-theme="dark"] .logo-img { filter: brightness(1.5); mix-blend-mode: normal; }

        .login-form { text-align: left; }

        .footer-text {
            margin-top: 28px;
            font-size: 14px;
            color: var(--muted);
            font-weight: 500;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }
        .footer-text a:hover { text-decoration: underline; color: var(--primary-dark); }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .welcome-back {
            margin-bottom: 8px;
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
        }

        .welcome-sub {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 28px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Logo -->
        <div class="logo-section">
            <img src="logo2.png" alt="SharpTrack Logo" class="logo-img">
        </div>

        <h1 class="welcome-back">Welcome back!</h1>
        <p class="welcome-sub">Sign in with your phone number and PIN</p>

        <!-- Login Form -->
        <div class="login-form">
            <div class="input-group">
                <label for="login-phone">Phone Number</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    </span>
                    <input type="tel" id="login-phone" placeholder="e.g. 08012345678" autocomplete="tel">
                </div>
            </div>

            <div class="input-group">
                <label for="login-pin">PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" id="login-pin" placeholder="Enter 6-digit PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password">
                    <span class="icon-right" id="toggle-pin-vis" role="button" tabindex="0" aria-label="Toggle PIN visibility">
                        <svg class="icon" id="pin-eye-icon" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="button" class="btn btn-primary btn-block btn-lg" id="login-btn" onclick="handleLogin()">
                Sign In
            </button>
        </div>

        <div class="footer-text">
            Don't have an account? <a href="signup.html">Create Account</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Auto-login if already authenticated
        initTheme();
        if (isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        // Toggle PIN visibility
        document.getElementById('toggle-pin-vis').addEventListener('click', function() {
            const input = document.getElementById('login-pin');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            document.getElementById('pin-eye-icon').innerHTML = isPassword
                ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
                : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
        });

        // Allow Enter key to submit
        document.getElementById('login-pin').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('login-phone').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('login-pin').focus();
        });

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const pin = document.getElementById('login-pin').value.trim();
            const btn = document.getElementById('login-btn');

            // Validation
            if (!phone) {
                showToast('warning', 'Phone Required', 'Please enter your phone number.');
                document.getElementById('login-phone').focus();
                return;
            }

            if (!pin) {
                showToast('warning', 'PIN Required', 'Please enter your 6-digit PIN.');
                document.getElementById('login-pin').focus();
                return;
            }

            if (pin.length !== 6 || !/^\d+$/.test(pin)) {
                showToast('warning', 'Invalid PIN', 'PIN must be exactly 6 digits.');
                document.getElementById('login-pin').focus();
                return;
            }

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                const data = await apiRequest('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ phone, pin })
                });

                setAuth(data.token, data.user);

                showToast('success', 'Welcome back!', `Signed in as ${data.user.name}`);

                setTimeout(() => {
                    if (data.user.onboardingCompleted === false) {
                        window.location.href = 'onboarding.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 500);

            } catch (err) {
                showToast('error', 'Sign In Failed', err.message);
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        }
    </script>
</body>
</html>
