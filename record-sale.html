<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Record Sale</title>
    <meta name="description" content="Record sales and manage your business transactions with SharpTrack.">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body { padding-bottom: 160px; }

        .page-title {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .page-title h1 { font-size: 24px; }
        .page-title p { font-size: 12px; color: var(--muted); margin-top: 3px; }

        .record-btn {
            display: flex; align-items: center; gap: 6px;
            background: none; border: 1.5px solid var(--primary); border-radius: var(--radius-md);
            padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--primary);
            cursor: pointer; white-space: nowrap; font-family: var(--font-family);
            transition: transform 0.1s, background-color 0.2s;
        }
        .record-btn:hover { background: var(--primary-light); }
        .record-btn:active { transform: scale(0.97); }

        .product-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .product-item:last-child { border-bottom: none; }

        .product-img {
            width: 48px; height: 48px; border-radius: var(--radius-md);
            background: var(--border-light); display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }

        .product-info { flex: 1; min-width: 0; }
        .product-info .name { font-size: 14px; font-weight: 600; color: var(--text); }
        .product-info .stock { font-size: 12px; color: var(--primary); margin-top: 2px; }

        .product-price { font-size: 14px; font-weight: 700; color: var(--text); flex-shrink: 0; min-width: 70px; text-align: right; }

        .qty-control { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        .qty-btn {
            width: 30px; height: 30px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
            background: var(--card-bg); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; color: var(--text); font-weight: 600;
            transition: all 0.1s; font-family: var(--font-family);
        }
        .qty-btn:active { transform: scale(0.9); background: var(--primary-light); border-color: var(--primary); }

        .qty-num { font-size: 14px; font-weight: 700; min-width: 20px; text-align: center; }

        /* CART */
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cart-header .title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .cart-header .summary { font-size: 12px; color: var(--muted); }
        .cart-header .total { font-size: 15px; font-weight: 700; color: var(--primary); }

        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-name { font-size: 14px; font-weight: 600; }
        .cart-item-qty { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .cart-item-total { font-size: 14px; font-weight: 700; color: var(--primary); }

        .remove-btn {
            background: none; border: none; cursor: pointer; color: var(--red);
            padding: 4px; margin-left: 8px; border-radius: 6px; display: flex; align-items: center;
        }
        .remove-btn:active { transform: scale(0.9); }

        .bottom-bar {
            position: fixed; bottom: 64px; left: 0; right: 0; max-width: 480px; margin: 0 auto;
            padding: 12px 20px 16px; background: var(--bg); border-top: 1px solid var(--border); z-index: 50;
        }
        .bottom-bar button {
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
            border-radius: var(--radius-lg); font-size: 16px; font-weight: 700; font-family: var(--font-family);
            cursor: pointer; transition: transform 0.1s; box-shadow: var(--shadow-primary);
        }
        .bottom-bar button:hover { background: var(--primary-dark); }
        .bottom-bar button:active { transform: scale(0.97); }
        .bottom-bar button:disabled { background: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

        .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div class="content">
        <div class="page-title">
            <div>
                <h1>Sales</h1>
                <p>Record a new sale and manage items.</p>
            </div>
            <button class="record-btn" onclick="scrollToCart()">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Cart
            </button>
        </div>

        <!-- STATS -->
        <div class="stat-cards" id="sale-stats">
            <div class="skeleton skeleton-stat"></div>
            <div class="skeleton skeleton-stat"></div>
        </div>

        <!-- PRODUCTS -->
        <div class="section">
            <div class="section-title">Add items to sale</div>
            <div class="search-row">
                <div class="search-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Search for items..." oninput="filterProducts()">
                </div>
            </div>
            <div id="productList">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </div>

        <!-- CART -->
        <div class="section" id="cartSection">
            <div class="cart-header">
                <span class="title">Current Sale</span>
                <span>
                    <span class="summary" id="cartCount">0 items</span>&nbsp;
                    <span class="total" id="cartTotal">₦0.00</span>
                </span>
            </div>
            <div id="cartBody">
                <div class="empty-state" style="padding:20px 0;">
                    <div class="empty-state-icon" style="width:48px;height:48px;">
                        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    </div>
                    <h3>No items added yet</h3>
                    <p>Search and add items from your inventory.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
        <button id="recordBtn" onclick="recordSale()" disabled>Record Sale</button>
    </div>

    <script src="js/app.js"></script>
    <script>
        const cart = {};
        const products = {};
        let allProducts = [];

        if (!initPage('sales')) { /* redirected */ }
        else {
            injectNavbar();
            injectBottomNav('sales');
            loadPageData();
        }

        async function loadPageData() {
            try {
                const [productData, salesData] = await Promise.allSettled([
                    apiRequest('/api/products'),
                    apiRequest('/api/sales/today')
                ]);

                // Stats
                if (salesData.status === 'fulfilled') {
                    const s = salesData.value;
                    document.getElementById('sale-stats').innerHTML = `
                        <div class="stat-card animate-fadeUp">
                            <div class="stat-icon green"><svg class="icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
                            <div class="label">Today's Sales</div>
                            <div class="value">${formatCurrency(s.total)}</div>
                            <div class="sub ${s.percentChange >= 0 ? 'up' : 'down'}">${s.salesCount} transactions</div>
                        </div>
                        <div class="stat-card animate-fadeUp" style="animation-delay:0.1s;">
                            <div class="stat-icon blue"><svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
                            <div class="label">Transactions</div>
                            <div class="value">${s.salesCount}</div>
                            <div class="sub">Today</div>
                        </div>
                    `;
                }

                // Products
                if (productData.status === 'fulfilled') {
                    allProducts = productData.value.products || [];
                    renderProductList(allProducts);
                } else {
                    document.getElementById('productList').innerHTML = '<div class="empty-state"><h3>No products</h3><p>Add stock first to start selling.</p></div>';
                }
            } catch (err) {
                showToast('error', 'Error', err.message);
            }
        }

        function renderProductList(list) {
            const container = document.getElementById('productList');
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No products found</h3><p>Add some inventory first.</p><button class="btn btn-primary btn-sm" onclick="window.location.href=\'add-stock.html\'">Add Stock</button></div>';
                return;
            }

            container.innerHTML = list.map(p => {
                products[p.id] = { name: p.name, price: p.sellingPrice, unit: p.unit, stock: p.quantity };
                return `
                <div class="product-item" data-name="${p.name.toLowerCase()}" data-id="${p.id}">
                    <div class="product-img">📦</div>
                    <div class="product-info">
                        <div class="name">${p.name}</div>
                        <div class="stock">In stock: ${p.quantity} ${p.unit}</div>
                    </div>
                    <div class="product-price">${formatCurrency(p.sellingPrice)}</div>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
                        <span class="qty-num" id="qty-${p.id}">${cart[p.id] || 0}</span>
                        <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
                    </div>
                </div>`;
            }).join('');
        }

        function changeQty(id, delta) {
            const p = products[id];
            const current = cart[id] || 0;
            const newQty = Math.max(0, Math.min(current + delta, p.stock));
            if (newQty === 0) delete cart[id];
            else cart[id] = newQty;
            const qtyEl = document.getElementById('qty-' + id);
            if (qtyEl) qtyEl.textContent = newQty;
            updateCart();
        }

        function updateCart() {
            const cartBody = document.getElementById('cartBody');
            const ids = Object.keys(cart);

            if (ids.length === 0) {
                cartBody.innerHTML = `<div class="empty-state" style="padding:20px 0;"><div class="empty-state-icon" style="width:48px;height:48px;"><svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div><h3>No items added yet</h3><p>Search and add items from your inventory.</p></div>`;
                document.getElementById('cartCount').textContent = '0 items';
                document.getElementById('cartTotal').textContent = '₦0.00';
                document.getElementById('recordBtn').disabled = true;
                return;
            }

            let total = 0;
            let html = '';
            ids.forEach(id => {
                const p = products[id];
                if (!p) return;
                const qty = cart[id];
                const itemTotal = p.price * qty;
                total += itemTotal;
                html += `<div class="cart-item"><div><div class="cart-item-name">${p.name}</div><div class="cart-item-qty">${qty} × ${formatCurrency(p.price)}</div></div><div style="display:flex;align-items:center"><span class="cart-item-total">${formatCurrency(itemTotal)}</span><button class="remove-btn" onclick="removeItem('${id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div></div>`;
            });

            cartBody.innerHTML = html;
            document.getElementById('cartCount').textContent = ids.length + ' item' + (ids.length > 1 ? 's' : '');
            document.getElementById('cartTotal').textContent = formatCurrency(total);
            document.getElementById('recordBtn').disabled = false;
        }

        function removeItem(id) {
            delete cart[id];
            const qtyEl = document.getElementById('qty-' + id);
            if (qtyEl) qtyEl.textContent = '0';
            updateCart();
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderProductList(filtered);
        }

        function scrollToCart() {
            document.getElementById('cartSection').scrollIntoView({ behavior: 'smooth' });
        }

        async function recordSale() {
            const ids = Object.keys(cart);
            if (ids.length === 0) return;

            const btn = document.getElementById('recordBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:white;"></span> Recording...';

            try {
                for (const id of ids) {
                    await apiRequest('/api/sales', {
                        method: 'POST',
                        body: JSON.stringify({
                            productId: id,
                            quantitySold: cart[id],
                            paymentMethod: 'cash'
                        })
                    });
                }

                showToast('success', 'Sale Recorded! 💰', `${ids.length} item(s) sold successfully.`);

                // Clear cart
                ids.forEach(id => {
                    delete cart[id];
                    const qtyEl = document.getElementById('qty-' + id);
                    if (qtyEl) qtyEl.textContent = '0';
                });
                updateCart();

                // Refresh data
                setTimeout(() => loadPageData(), 1000);

            } catch (err) {
                showToast('error', 'Sale Failed', err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Record Sale';
            }
        }
    </script>
</body>
</html>
