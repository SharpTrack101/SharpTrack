<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Create Account</title>
    <meta name="description" content="Create your SharpTrack account to start managing your business inventory and sales.">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at bottom right, rgba(10, 77, 51, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(10, 77, 51, 0.08) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.4s ease both;
        }

        .logo-section {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo-img { width: 260px; max-width: 100%; height: auto; mix-blend-mode: multiply; }
        [data-theme="dark"] .logo-img { filter: brightness(1.5); mix-blend-mode: normal; }

        .page-title { font-size: 22px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 4px; }
        .page-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 24px; }

        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: var(--muted);
            text-align: center;
            font-weight: 500;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }
        .footer-text a:hover { text-decoration: underline; }

        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-section">
            <img src="logo2.png" alt="SharpTrack Logo" class="logo-img">
        </div>

        <h1 class="page-title">Create Account</h1>
        <p class="page-sub">Start tracking your business in minutes</p>

        <div id="signupForm">
            <div class="name-row">
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <div class="input-wrapper">
                        <span class="icon-left">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                        <input type="text" id="firstName" placeholder="First name" autocomplete="given-name">
                    </div>
                </div>
                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <div class="input-wrapper">
                        <span class="icon-left">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                        <input type="text" id="lastName" placeholder="Last name" autocomplete="family-name">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12.9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.59 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </span>
                    <input type="tel" id="phone" placeholder="e.g. 08012345678" autocomplete="tel">
                </div>
            </div>

            <div class="input-group">
                <label for="pin">Create PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="pin" placeholder="6-digit PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password">
                    <span class="icon-right" onclick="toggleVis('pin')">
                        <svg class="icon" id="pin-eye" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </span>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPin">Confirm PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="confirmPin" placeholder="Confirm PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password">
                    <span class="icon-right" onclick="toggleVis('confirmPin')">
                        <svg class="icon" id="confirmPin-eye" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </span>
                </div>
            </div>

            <button type="button" class="btn btn-primary btn-block btn-lg" id="signup-btn" onclick="handleSignup()">Create Account</button>
        </div>

        <div class="footer-text">
            Already have an account? <a href="index.html">Sign In</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        initTheme();
        if (isLoggedIn()) window.location.href = 'dashboard.html';

        function toggleVis(inputId) {
            const input = document.getElementById(inputId);
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
        }

        async function handleSignup() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const confirmPin = document.getElementById('confirmPin').value.trim();
            const btn = document.getElementById('signup-btn');

            if (!firstName || !lastName) {
                showToast('warning', 'Name Required', 'Please enter your first and last name.');
                return;
            }
            if (!phone) {
                showToast('warning', 'Phone Required', 'Please enter your phone number.');
                return;
            }
            if (!pin || pin.length !== 6 || !/^\d{6}$/.test(pin)) {
                showToast('warning', 'Invalid PIN', 'PIN must be exactly 6 digits.');
                return;
            }
            if (pin !== confirmPin) {
                showToast('error', 'PIN Mismatch', 'Your PINs do not match. Please try again.');
                return;
            }

            // Save pending data and send OTP
            localStorage.setItem('pendingSignup', JSON.stringify({
                name: firstName + ' ' + lastName, phone, pin
            }));

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending verification...';

            try {
                await apiRequest('/api/otp/send', {
                    method: 'POST',
                    body: JSON.stringify({ phone })
                });

                showToast('success', 'Code Sent!', 'A verification code has been sent to your phone.');
                setTimeout(() => { window.location.href = 'verify.html'; }, 800);
            } catch (err) {
                showToast('error', 'Failed to Send Code', err.message);
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        }
    </script>
</body>
</html>
