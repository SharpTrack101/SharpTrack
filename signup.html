<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack - Create Account</title>
    <style>
        :root {
            --primary: #0a4d33;
            --primary-dark: #083b27;
            --bg: #f0ebe0;
            --card-bg: #ffffff;
            --border: #e8e3d8;
            --text: #1a2e26;
            --muted: #7a8880;
            --orange: #e07b2a;
            --orange-bg: #fdf3ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at bottom right, rgba(10, 77, 51, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(10, 77, 51, 0.08) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 90px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-img {
            width: 280px;
            max-width: 100%;
            height: auto;
            mix-blend-mode: multiply;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 45px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background-color: #fafaf8;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .input-wrapper input::placeholder {
            color: var(--muted);
            opacity: 0.7;
        }

        .icon-left {
            position: absolute;
            left: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .icon-right {
            position: absolute;
            right: 15px;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .icon-right:hover {
            opacity: 0.7;
        }

        .icon-right:active {
            transform: scale(0.95);
        }

        /* Icons styling */
        svg.icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Sign Up Button */
        .signup-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 16px rgba(10, 77, 51, 0.2);
        }

        .signup-btn:hover {
            background-color: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(10, 77, 51, 0.3);
        }

        .signup-btn:active {
            transform: scale(0.97);
        }

        /* Footer */
        .footer-text {
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
            text-align: center;
            font-weight: 500;
        }

        .signin-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .signin-link:hover {
            text-decoration: underline;
            color: var(--primary-dark);
        }

        /* PIN input formatting */
        input[inputmode="numeric"] {
            letter-spacing: 4px;
            font-weight: 600;
        }

        input[inputmode="numeric"]::placeholder {
            letter-spacing: normal;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <img src="logo2.png" alt="SharpTrack Logo" class="logo-img">
        </div>

        <!-- Signup Form Container (No <form> tag) -->
        <div id="signupForm">
            <!-- First Name -->
            <div class="form-group">
                <label for="firstName">First Name</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="firstName" placeholder="Enter your first name" autocomplete="given-name">
                </div>
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="lastName" placeholder="Enter your last name" autocomplete="family-name">
                </div>
            </div>

            <!-- Phone Number -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12.9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.59 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </span>
                    <input type="tel" id="phone" placeholder="Enter your phone number" autocomplete="tel">
                </div>
            </div>

            <!-- PIN -->
            <div class="form-group">
                <label for="pin">PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="pin" placeholder="Enter 6-digit PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password">
                    <span class="icon-right" onclick="toggleVisibility('pin', this)">
                        <svg class="icon" id="pin-eye" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Confirm PIN -->
            <div class="form-group">
                <label for="confirmPin">Confirm PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="confirmPin" placeholder="Confirm your PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password">
                    <span class="icon-right" onclick="toggleVisibility('confirmPin', this)">
                        <svg class="icon" id="confirmPin-eye" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="button" class="signup-btn" onclick="handleSignup()">Sign Up</button>
        </div>

        <div class="footer-text">
            Already have an account? <a href="index.html" class="signin-link">Sign In</a>
        </div>
    </div>

    <script>
        function toggleVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.getAttribute('type') === 'password';
            input.setAttribute('type', isPassword ? 'text' : 'password');

            // Swap icon between eye-off and eye
            btn.innerHTML = isPassword
                ? `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                   </svg>`
                : `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                   </svg>`;
        }

                async function handleSignup() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const confirmPin = document.getElementById('confirmPin').value.trim();

            if (!firstName || !lastName || !phone || !pin || !confirmPin) {
                alert('Please fill in all fields.'); return;
            }
            if (!/^\d{6}$/.test(pin)) {
                alert('PIN must be exactly 6 digits.'); return;
            }
            if (pin !== confirmPin) {
                alert('PINs do not match.'); return;
            }

            localStorage.setItem('pendingSignup', JSON.stringify({ 
                name: firstName + ' ' + lastName, phone, pin 
            }));

            try {
                const otpRes = await fetch('http://localhost:3000/api/otp/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const otpData = await otpRes.json();

                if (otpRes.ok) {
                    window.location.href = 'verify.html';
                } else {
                    alert(otpData.error || 'Failed to send OTP');
                }
            } catch (e) {
                alert('Cannot connect to server.');
            }
        }
    </script>
</body>
</html>
